  <!-- Title -->
  <h1 class="registro-title">Crea una cuenta</h1>

  <!-- Form -->
  <form [formGroup]="registroForm" (ngSubmit)="onSubmit()" class="registro-form">
    
    <h2 class="section-title">Datos personales</h2>

    <!-- Email Field (Full Width) -->
    <div class="form-group full-width">
      <label for="email">Correo electrónico</label>
      <input 
        id="email" 
        type="email" 
        formControlName="email" 
        placeholder="Este correo será tu usuario"
        [class.invalid]="registroForm.get('email')?.invalid && registroForm.get('email')?.touched"
      >
    </div>

    <!-- Tipo de Documento (Half Width) -->
    <div class="form-group half-width">
      <label for="tipoDocumento">Tipo documento</label>
      <div class="select-container">
        <select 
          id="tipoDocumento" 
          formControlName="tipoDocumento"
          [class.invalid]="registroForm.get('tipoDocumento')?.invalid && registroForm.get('tipoDocumento')?.touched"
        >
          <option value="" disabled selected>Selecciona una opción</option>
          <option *ngFor="let tipo of tiposDocumento" [value]="tipo">{{tipo}}</option>
        </select>
        <svg class="dropdown-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#007f87" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
    </div>

    <!-- Número de Documento (Half Width) -->
    <div class="form-group half-width">
      <label for="numeroDocumento">Número de documento</label>
      <input 
        id="numeroDocumento" 
        type="text" 
        formControlName="numeroDocumento" 
        placeholder="Escribe tu número de documento"
        [class.invalid]="registroForm.get('numeroDocumento')?.invalid && registroForm.get('numeroDocumento')?.touched"
      >
    </div>

    <!-- Nombres (Half Width) -->
    <div class="form-group half-width">
      <label for="nombres">Nombres</label>
      <input 
        id="nombres" 
        type="text" 
        formControlName="nombres" 
        placeholder="Escribe tus nombres"
        [class.invalid]="registroForm.get('nombres')?.invalid && registroForm.get('nombres')?.touched"
      >
    </div>

    <!-- Apellidos (Half Width) -->
    <div class="form-group half-width">
      <label for="apellidos">Apellidos</label>
      <input 
        id="apellidos" 
        type="text" 
        formControlName="apellidos" 
        placeholder="Escribe tus apellidos"
        [class.invalid]="registroForm.get('apellidos')?.invalid && registroForm.get('apellidos')?.touched"
      >
    </div>

    <!-- Celular (Half Width) -->
    <div class="form-group half-width">
      <label for="celular">Celular</label>
      <input 
        id="celular" 
        type="tel" 
        formControlName="celular" 
        placeholder="Escribe tu número de celular"
        [class.invalid]="registroForm.get('celular')?.invalid && registroForm.get('celular')?.touched"
      >
    </div>

    <!-- Teléfono Adicional (Half Width) -->
    <div class="form-group half-width">
      <label for="telefonoAdicional">Teléfono adicional</label>
      <input 
        id="telefonoAdicional" 
        type="tel" 
        formControlName="telefonoAdicional" 
        placeholder="Escribe tu número de teléfono adicion"
        [class.invalid]="registroForm.get('telefonoAdicional')?.invalid && registroForm.get('telefonoAdicional')?.touched"
      >
    </div>

    <!-- Checkbox Terminos -->
    <div class="form-group checkbox-group full-width">
      <label class="custom-checkbox">
        <input type="checkbox" formControlName="terminos">
        <span class="checkmark"></span>
        <span class="checkbox-text">
          Acepto <a href="javascript:void(0)">términos y condiciones de la tienda online</a> y autorizo el <a href="javascript:void(0)">tratamiento de datos personales de acuerdo a la política de Claro Colombia.</a>
        </span>
      </label>
    </div>

    <button type="submit" class="submit-button" [disabled]="registroForm.invalid">
      Crear cuenta
    </button>
  </form>
</div>
